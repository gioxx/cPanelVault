services:
  cpanelvault:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./ftp_config.json:/app/ftp_config.json:ro
      - backups:/backups
      - data:/data
    environment:
      STATUS_FILE: /data/status.json
      CONFIG_FILE: /app/ftp_config.json
      TZ: Europe/Rome
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/status')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  backups:
  data:
